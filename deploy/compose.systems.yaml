name: ${LHMSB_COMPOSE_PROJECT:-lhmsb-systems}

# All images are loaded by bootstrap_systems_server.sh and are addressed by
# local immutable IDs.  pull_policy=never is deliberate: a run must not
# silently replace a pinned image from a registry.
services:
  qdrant:
    image: "${QDRANT_RUNTIME_IMAGE_ID:?set QDRANT_RUNTIME_IMAGE_ID}"
    pull_policy: never
    restart: unless-stopped
    expose:
      - "6333"
      - "6334"
    volumes:
      - "${LHMSB_DATA_ROOT:-/data/lhmsb}/qdrant/${LHMSB_SYSTEM_NAMESPACE:-shared}:/qdrant/storage"
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks:
      - backend

  neo4j:
    image: "${NEO4J_RUNTIME_IMAGE_ID:?set NEO4J_RUNTIME_IMAGE_ID}"
    pull_policy: never
    restart: unless-stopped
    environment:
      NEO4J_AUTH: none
      NEO4J_server_memory_heap_initial__size: "2G"
      NEO4J_server_memory_heap_max__size: "8G"
      NEO4J_server_memory_pagecache_size: "4G"
    expose:
      - "7474"
      - "7687"
    volumes:
      - "${LHMSB_DATA_ROOT:-/data/lhmsb}/neo4j/${LHMSB_SYSTEM_NAMESPACE:-shared}/data:/data"
      - "${LHMSB_DATA_ROOT:-/data/lhmsb}/neo4j/${LHMSB_SYSTEM_NAMESPACE:-shared}/logs:/logs"
      - "${LHMSB_DATA_ROOT:-/data/lhmsb}/neo4j/${LHMSB_SYSTEM_NAMESPACE:-shared}/plugins:/plugins"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p '' 'RETURN 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    networks:
      - backend

  embedding:
    image: "${TEI_RUNTIME_IMAGE_ID:?set TEI_RUNTIME_IMAGE_ID}"
    pull_policy: never
    restart: unless-stopped
    command:
      - --model-id
      - /data/lhmsb/models/bge-m3
      - --dtype
      - float16
      - --port
      - "80"
      - --max-client-batch-size
      - "32"
    expose:
      - "80"
    volumes:
      - "${LHMSB_DATA_ROOT:-/data/lhmsb}:/data/lhmsb:ro"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids:
                - "${LHMSB_EMBEDDING_GPU_ID:-0}"
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 60s
    networks:
      - backend

  reranker:
    image: "${TEI_RUNTIME_IMAGE_ID:?set TEI_RUNTIME_IMAGE_ID}"
    pull_policy: never
    restart: unless-stopped
    command:
      - --model-id
      - /data/lhmsb/models/bge-reranker-v2-m3
      - --dtype
      - float16
      - --port
      - "80"
      - --max-client-batch-size
      - "32"
    expose:
      - "80"
    volumes:
      - "${LHMSB_DATA_ROOT:-/data/lhmsb}:/data/lhmsb:ro"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids:
                - "${LHMSB_RERANKER_GPU_ID:-1}"
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 60s
    networks:
      - backend

  core-worker:
    image: "${LHMSB_CORE_WORKER_IMAGE_DIGEST:?set LHMSB_CORE_WORKER_IMAGE_DIGEST}"
    pull_policy: never
    user: "${LHMSB_WORKER_UID:?set LHMSB_WORKER_UID}:${LHMSB_WORKER_GID:?set LHMSB_WORKER_GID}"
    init: true
    read_only: true
    depends_on:
      qdrant: {condition: service_healthy}
      neo4j: {condition: service_healthy}
      embedding: {condition: service_healthy}
      reranker: {condition: service_healthy}
    environment:
      HOME: /tmp/lhmsb
      LHMSB_DATA_ROOT: /data/lhmsb
      LHMSB_SYSTEM_NAMESPACE: "${LHMSB_SYSTEM_NAMESPACE:-shared}"
      LHMSB_QDRANT_URL: http://qdrant:6333
      LHMSB_NEO4J_URI: bolt://neo4j:7687
      LHMSB_EMBEDDING_URL: http://embedding:80
      LHMSB_RERANKER_URL: http://reranker:80
      LHMSB_CONTAINERIZED: "1"
      LHMSB_LIVE_PREFLIGHT: "${LHMSB_LIVE_PREFLIGHT:-0}"
      LHMSB_LIVE_QUALIFICATION: "${LHMSB_LIVE_QUALIFICATION:-0}"
      LHMSB_IMAGE_DIGEST_MANIFEST: /data/lhmsb/manifests/images.json
      LHMSB_MODEL_FILE_MANIFEST: /data/lhmsb/manifests/models.json
      OPENCODE_ZEN_API_KEY: "${OPENCODE_ZEN_API_KEY:-}"
      OPENCODE_ZEN_BASE_URL: "${OPENCODE_ZEN_BASE_URL:-https://opencode.ai/zen}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      DEEPSEEK_BASE_URL: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
    volumes:
      - "${LHMSB_DATA_ROOT:-/data/lhmsb}:/data/lhmsb"
      - "${LHMSB_REPO_ROOT:-.}:/workspace/source:ro"
    tmpfs:
      - /tmp/lhmsb
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-m", "lhmsb.qualification", "--help"]
      interval: 30s
      timeout: 15s
      retries: 3
    networks: [backend, provider_egress]

  mem0-worker:
    image: "${LHMSB_MEM0_WORKER_IMAGE_DIGEST:?set LHMSB_MEM0_WORKER_IMAGE_DIGEST}"
    pull_policy: never
    user: "${LHMSB_WORKER_UID:?set LHMSB_WORKER_UID}:${LHMSB_WORKER_GID:?set LHMSB_WORKER_GID}"
    init: true
    read_only: true
    depends_on:
      qdrant: {condition: service_healthy}
      neo4j: {condition: service_healthy}
      embedding: {condition: service_healthy}
      reranker: {condition: service_healthy}
    environment:
      HOME: /tmp/lhmsb
      LHMSB_DATA_ROOT: /data/lhmsb
      LHMSB_SYSTEM_NAMESPACE: "${LHMSB_SYSTEM_NAMESPACE:-shared}"
      LHMSB_QDRANT_URL: http://qdrant:6333
      LHMSB_NEO4J_URI: bolt://neo4j:7687
      LHMSB_EMBEDDING_URL: http://embedding:80
      LHMSB_RERANKER_URL: http://reranker:80
      LHMSB_CONTAINERIZED: "1"
      LHMSB_LIVE_PREFLIGHT: "${LHMSB_LIVE_PREFLIGHT:-0}"
      LHMSB_LIVE_QUALIFICATION: "${LHMSB_LIVE_QUALIFICATION:-0}"
      LHMSB_IMAGE_DIGEST_MANIFEST: /data/lhmsb/manifests/images.json
      LHMSB_MODEL_FILE_MANIFEST: /data/lhmsb/manifests/models.json
      OPENCODE_ZEN_API_KEY: "${OPENCODE_ZEN_API_KEY:-}"
      OPENCODE_ZEN_BASE_URL: "${OPENCODE_ZEN_BASE_URL:-https://opencode.ai/zen}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      DEEPSEEK_BASE_URL: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
    volumes:
      - "${LHMSB_DATA_ROOT:-/data/lhmsb}:/data/lhmsb"
      - "${LHMSB_REPO_ROOT:-.}:/workspace/source:ro"
    tmpfs:
      - /tmp/lhmsb
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-m", "lhmsb.qualification", "--help"]
      interval: 30s
      timeout: 15s
      retries: 3
    networks: [backend, provider_egress]

  amem-worker:
    image: "${LHMSB_AMEM_WORKER_IMAGE_DIGEST:?set LHMSB_AMEM_WORKER_IMAGE_DIGEST}"
    pull_policy: never
    user: "${LHMSB_WORKER_UID:?set LHMSB_WORKER_UID}:${LHMSB_WORKER_GID:?set LHMSB_WORKER_GID}"
    init: true
    read_only: true
    depends_on:
      qdrant: {condition: service_healthy}
      neo4j: {condition: service_healthy}
      embedding: {condition: service_healthy}
      reranker: {condition: service_healthy}
    environment:
      HOME: /tmp/lhmsb
      LHMSB_DATA_ROOT: /data/lhmsb
      LHMSB_SYSTEM_NAMESPACE: "${LHMSB_SYSTEM_NAMESPACE:-shared}"
      LHMSB_QDRANT_URL: http://qdrant:6333
      LHMSB_NEO4J_URI: bolt://neo4j:7687
      LHMSB_EMBEDDING_URL: http://embedding:80
      LHMSB_RERANKER_URL: http://reranker:80
      LHMSB_CONTAINERIZED: "1"
      LHMSB_LIVE_PREFLIGHT: "${LHMSB_LIVE_PREFLIGHT:-0}"
      LHMSB_LIVE_QUALIFICATION: "${LHMSB_LIVE_QUALIFICATION:-0}"
      LHMSB_IMAGE_DIGEST_MANIFEST: /data/lhmsb/manifests/images.json
      LHMSB_MODEL_FILE_MANIFEST: /data/lhmsb/manifests/models.json
      OPENCODE_ZEN_API_KEY: "${OPENCODE_ZEN_API_KEY:-}"
      OPENCODE_ZEN_BASE_URL: "${OPENCODE_ZEN_BASE_URL:-https://opencode.ai/zen}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      DEEPSEEK_BASE_URL: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
    volumes:
      - "${LHMSB_DATA_ROOT:-/data/lhmsb}:/data/lhmsb"
      - "${LHMSB_REPO_ROOT:-.}:/workspace/source:ro"
    tmpfs:
      - /tmp/lhmsb
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-m", "lhmsb.qualification", "--help"]
      interval: 30s
      timeout: 15s
      retries: 3
    networks: [backend, provider_egress]

  memos-worker:
    image: "${LHMSB_MEMOS_WORKER_IMAGE_DIGEST:?set LHMSB_MEMOS_WORKER_IMAGE_DIGEST}"
    pull_policy: never
    user: "${LHMSB_WORKER_UID:?set LHMSB_WORKER_UID}:${LHMSB_WORKER_GID:?set LHMSB_WORKER_GID}"
    init: true
