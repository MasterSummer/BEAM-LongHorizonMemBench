      OPENCODE_ZEN_API_KEY: "${OPENCODE_ZEN_API_KEY:-}"
      OPENCODE_ZEN_BASE_URL: "${OPENCODE_ZEN_BASE_URL:-https://opencode.ai/zen}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
