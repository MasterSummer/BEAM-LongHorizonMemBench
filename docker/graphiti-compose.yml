# Optional local graph DB for the Graphiti adapter's LIVE test (LHMSB_LIVE_GRAPHITI=1).
#
# NOT required for the unit tests: those inject an in-memory fake via
# sys.modules["graphiti_core"] patching and never touch a real DB.
#
# Usage:
#   docker compose -f docker/graphiti-compose.yml up -d
#   export NEO4J_URI=bolt://localhost:7687 NEO4J_USER=neo4j NEO4J_PASSWORD=lhmsbpass
#   LHMSB_LIVE_GRAPHITI=1 pytest tests/contract/test_graphiti.py -k live
#
# FalkorDB alternative (Redis-protocol graph, lighter weight) — swap the service for:
#   falkordb:
#     image: falkordb/falkordb:latest
#     ports: ["6379:6379", "3000:3000"]
# and initialize GraphitiAdapter with a FalkorDB-backed driver per graphiti-core docs.

services:
  neo4j:
    image: neo4j:5.26
    container_name: lhmsb-graphiti-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol (graphiti connects here)
    environment:
      - NEO4J_AUTH=neo4j/lhmsbpass
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - lhmsb_graphiti_neo4j_data:/data

volumes:
  lhmsb_graphiti_neo4j_data:
